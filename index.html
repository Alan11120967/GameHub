<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的游戏大厅</title>
    <style>
        /* --- 基础样式设置 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* 深色背景 */
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* --- 头部样式 --- */
        header {
            background-color: #16213e;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            color: #e94560; /* 强调色 */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 游戏列表容器 (Grid布局) --- */
        .game-container {
            display: grid;
            /* 响应式设计：自动填充，每个卡片最小宽度250px */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- 单个游戏卡片样式 --- */
        .game-card {
            background-color: #0f3460;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none; /* 去掉链接下划线 */
            color: inherit;
            display: block;
        }

        /* 鼠标悬停效果 */
        .game-card:hover {
            transform: translateY(-10px); /* 向上浮动 */
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4); /* 发光效果 */
        }

        /* --- 游戏封面图 --- */
        .game-image {
            width: 100%;
            height: 150px;
            object-fit: cover; /* 保证图片比例不被拉伸 */
            background-color: #ddd; /* 图片加载前的占位色 */
        }

        /* --- 游戏信息区域 --- */
        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 1.2em;
            margin: 10px 0;
            font-weight: bold;
        }

        .game-desc {
            font-size: 0.9em;
            color: #a0a0a0;
            margin-bottom: 15px;
        }

        .play-btn {
            display: inline-block;
            background-color: #e94560;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>游戏大厅</h1>
    </header>

    <main class="game-container">

        <!-- ========================================== -->
        <!-- 游戏卡片 1 开始 -->
        <!-- ========================================== -->
        
        <!-- 
           👇 重点在这里 👇 
           href="这里填写游戏的网址" 
           如果是本地文件，写文件名 (例如 game1.html)
           如果是外部网站，写完整网址 (例如 https://...)
        -->
        <a href="https://alan11120967.github.io/my-site/" class="game-card" target="_blank">
            <img src="Pic/OIP-C.webp" alt="游戏封面" class="game-image">
            
            <div class="game-info">
                <div class="game-title">逃离设施</div>
                <div class="game-desc">类似SCP的CB。</div>
                <span class="play-btn">开始游戏</span>
            </div>
        </a>



    </main>

</body>
</html>
